volumes:
  db_data_iam: {}
  db_data_restaurant: {}
  db_data_order: {}
  db_data_payment: {}
  rabbitmq_data: {}

networks:
  app_net:
    driver: bridge
  external-network:
    driver: bridge

services:
  kong-service:
    image: kong:3.9.1-ubuntu
    container_name: kong-gateway
    restart: always
    volumes:
      - ./kong:/usr/local/kong/declarative
      - ./certs:/etc/kong/certs
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_NGINX_WORKER_PROCESSES: "1"
      KONG_MEM_CACHE_SIZE: "64m"
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    ports:
      - "${KONG_PORT_HTTP:-80}:8000"
    cpus: 1.0
    mem_reservation: 256m
    mem_limit: 512m
    networks:
      - app_net
      - external-network

  rabbitmq:
    image: rabbitmq:3
    container_name: restaurant-rabbitmq
    restart: unless-stopped
    networks:
      - app_net
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD}"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/mnesia/
    cpus: 0.75
    mem_reservation: 192m
    mem_limit: 384m

  iam-postgres:
    image: postgres:17
    container_name: pg-iam
    restart: unless-stopped
    networks:
      - app_net
    environment:
      POSTGRES_DB: "${IAM_DB_NAME}"
      POSTGRES_USER: "${IAM_DB_USER}"
      POSTGRES_PASSWORD: "${IAM_DB_PASSWORD}"
      TZ: "${TIME_ZONE}"
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - max_connections=40
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${IAM_DB_USER} -d ${IAM_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s
    volumes:
      - db_data_iam:/var/lib/postgresql/data
    cpus: 0.50
    mem_reservation: 128m
    mem_limit: 256m

  restaurant-postgres:
    image: postgres:17
    container_name: pg-restaurant
    restart: unless-stopped
    networks:
      - app_net
    environment:
      POSTGRES_DB: "${RESTAURANT_DB_NAME}"
      POSTGRES_USER: "${RESTAURANT_DB_USER}"
      POSTGRES_PASSWORD: "${RESTAURANT_DB_PASSWORD}"
      TZ: "${TIME_ZONE}"
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - max_connections=40
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RESTAURANT_DB_USER} -d ${RESTAURANT_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s
    volumes:
      - db_data_restaurant:/var/lib/postgresql/data
    cpus: 0.50
    mem_reservation: 128m
    mem_limit: 256m

  order-postgres:
    image: postgres:17
    container_name: pg-order
    restart: unless-stopped
    networks:
      - app_net
    environment:
      POSTGRES_DB: "${ORDER_DB_NAME}"
      POSTGRES_USER: "${ORDER_DB_USER}"
      POSTGRES_PASSWORD: "${ORDER_DB_PASSWORD}"
      TZ: "${TIME_ZONE}"
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - max_connections=40
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ORDER_DB_USER} -d ${ORDER_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s
    volumes:
      - db_data_order:/var/lib/postgresql/data
    cpus: 0.50
    mem_reservation: 128m
    mem_limit: 256m

  payment-postgres:
    image: postgres:17
    container_name: pg-payment
    restart: unless-stopped
    networks:
      - app_net
    environment:
      POSTGRES_DB: "${PAYMENT_DB_NAME}"
      POSTGRES_USER: "${PAYMENT_DB_USER}"
      POSTGRES_PASSWORD: "${PAYMENT_DB_PASSWORD}"
      TZ: "${TIME_ZONE}"
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - max_connections=40
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYMENT_DB_USER} -d ${PAYMENT_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s
    volumes:
      - db_data_payment:/var/lib/postgresql/data
    cpus: 0.50
    mem_reservation: 128m
    mem_limit: 256m

  identity-access-management:
    image: kervincandido/identity-access-management:latest
    container_name: identity-access-management
    restart: unless-stopped
    networks:
      - app_net
    depends_on:
      iam-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: "${IAM_SPRING_PROFILES}"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://iam-postgres:5432/${IAM_DB_NAME}"
      SPRING_DATASOURCE_USERNAME: "${IAM_DB_USER}"
      SPRING_DATASOURCE_PASSWORD: "${IAM_DB_PASSWORD}"
      MQ_HOST: "restaurant-rabbitmq"
      MQ_USER: "${RABBITMQ_USER}"
      MQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m -XX:MaxMetaspaceSize=128m -XX:+UseSerialGC"
      TZ: "${TIME_ZONE}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    cpus: 1.0
    mem_reservation: 256m
    mem_limit: 512m

  restaurant:
    image: kervincandido/restaurant:latest
    container_name: restaurant
    restart: unless-stopped
    networks:
      - app_net
    depends_on:
      restaurant-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: "${RESTAURANT_SPRING_PROFILES}"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://restaurant-postgres:5432/${RESTAURANT_DB_NAME}"
      SPRING_DATASOURCE_USERNAME: "${RESTAURANT_DB_USER}"
      SPRING_DATASOURCE_PASSWORD: "${RESTAURANT_DB_PASSWORD}"
      MQ_HOST: "restaurant-rabbitmq"
      MQ_USER: "${RABBITMQ_USER}"
      MQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m -XX:MaxMetaspaceSize=128m -XX:+UseSerialGC"
      TZ: "${TIME_ZONE}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    cpus: 1.0
    mem_reservation: 256m
    mem_limit: 512m

  order:
    image: kervincandido/order:latest
    container_name: order
    restart: unless-stopped
    networks:
      - app_net
    depends_on:
      order-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: "${ORDER_SPRING_PROFILES}"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://order-postgres:5432/${ORDER_DB_NAME}"
      SPRING_DATASOURCE_USERNAME: "${ORDER_DB_USER}"
      SPRING_DATASOURCE_PASSWORD: "${ORDER_DB_PASSWORD}"
      MQ_HOST: "restaurant-rabbitmq"
      MQ_USER: "${RABBITMQ_USER}"
      MQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m -XX:MaxMetaspaceSize=128m -XX:+UseSerialGC"
      TZ: "${TIME_ZONE}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    cpus: 1.0
    mem_reservation: 256m
    mem_limit: 512m

  payment:
    image: kervincandido/restaurant-payment-service:latest
    container_name: payment
    restart: unless-stopped
    networks:
      - app_net
    depends_on:
      payment-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: "${PAYMENT_SPRING_PROFILES}"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://payment-postgres:5432/${PAYMENT_DB_NAME}"
      SPRING_DATASOURCE_USERNAME: "${PAYMENT_DB_USER}"
      SPRING_DATASOURCE_PASSWORD: "${PAYMENT_DB_PASSWORD}"
      SPRING_RABBITMQ_HOST: "restaurant-rabbitmq"
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: "${RABBITMQ_USER}"
      SPRING_RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      SERVER_PORT: "8080"
      APP_RABBIT_QUEUE_PAYMENT_ORDER_CREATED: "payment.order.created"
      APP_RABBIT_DLQ_PAYMENT_ORDER_CREATED: "payment.order.created.dlq"
      APP_RABBIT_ROUTING_KEY_ORDER_CREATED: "order.created"
      APP_RABBIT_QUEUE_PAYMENT_APPROVED_DEBUG: "order.payment.approved"
      APP_RABBIT_DLQ_PAYMENT_APPROVED_DEBUG: "order.payment.approved.dlq"
      APP_RABBIT_ROUTING_KEY_PAYMENT_APPROVED: "payment.approved"
      APP_RABBIT_QUEUE_PAYMENT_PENDING_DEBUG: "order.payment.pending"
      APP_RABBIT_DLQ_PAYMENT_PENDING_DEBUG: "order.payment.pending.dql"
      APP_RABBIT_ROUTING_KEY_PAYMENT_PENDING: "payment.pending"
      APP_RABBIT_QUEUE_PAYMENT_FAILED_DEBUG: "payment.failed"
      APP_RABBIT_DLQ_PAYMENT_FAILED_DEBUG: "payment.failed.dlq"
      APP_RABBIT_ROUTING_KEY_PAYMENT_FAILED: "payment.failed"
      APP_EXTERNAL_PAYMENT_BASE_URL: "http://kong-service:8000"
      APP_EXTERNAL_PAYMENT_REQUEST_PATH: "/external-payment/requisicao"
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m -XX:MaxMetaspaceSize=128m -XX:+UseSerialGC"
      TZ: "${TIME_ZONE}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    cpus: 1.0
    mem_reservation: 256m
    mem_limit: 512m

  procpag:
    image: docker.io/erickemprobr/procpag:latest
    platform: linux/amd64
    container_name: payment-procpag
    restart: unless-stopped
    ports:
      - "${PROCPAG_PORT:-8089}:8089"
    networks:
      - external-network
    cpus: 0.50
    mem_reservation: 96m
    mem_limit: 192m
